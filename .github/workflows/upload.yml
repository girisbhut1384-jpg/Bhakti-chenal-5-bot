name: Auto YouTube Shorts Generator

on:
  schedule:
    # ⏱️ हर 6 घंटे में (00:00, 06:00, 12:00, 18:00 UTC) अपने आप चलने के लिए शेड्यूल
    - cron: '0 */6 * * *'
  workflow_dispatch: # बटन दबाकर तुरंत मैन्युअल रूप से चलाने के लिए

jobs:
  build_and_upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies (ImageMagick, Fonts)
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick ffmpeg fonts-noto-core
        # इमेजमैजिक की सुरक्षा पाबंदी हटाना ताकि वीडियो रेंडरिंग न रुके
        sudo rm -f /etc/ImageMagick-6/policy.xml
        sudo rm -f /etc/ImageMagick-7/policy.xml

    - name: Install Python Libraries
      run: |
        python -m pip install --upgrade pip
        # स्टेबल लाइब्रेरी वर्ज़न ताकि भविष्य में कोई एरर न आए
        pip install requests moviepy==1.0.3 pillow edge-tts google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

    - name: Run Video Generator Script
      run: |
        python main.py
