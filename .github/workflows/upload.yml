name: Auto YouTube Shorts Generator

on:
  schedule:
    # ⏱️ हर 6 घंटे में (00:00, 06:00, 12:00, 18:00 UTC) अपने आप वीडियो बनाने और अपलोड करने के लिए
    - cron: '0 */6 * * *'
  workflow_dispatch: # बटन दबाकर जब चाहें मैन्युअल रूप से तुरंत चलाने के लिए

jobs:
  build_and_upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies (ImageMagick, Fonts)
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick ffmpeg fonts-noto-core
        # कनवर्टर को क्रैश होने से बचाने के लिए पॉलिसी फिक्स
        sudo rm -f /etc/ImageMagick-6/policy.xml
        sudo rm -f /etc/ImageMagick-7/policy.xml

    - name: Install Python Libraries
      run: |
        python -m pip install --upgrade pip
        # लाइब्रेरी के नामों को पूरी तरह शुद्ध और त्रुटिहीन कर दिया गया है
        pip install requests moviepy pillow edge-tts google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

    - name: Run Video Generator Script
      run: |
        python main.py
