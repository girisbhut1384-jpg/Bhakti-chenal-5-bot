name: Auto YouTube Shorts Generator

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build_and_upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies (ImageMagick, Fonts)
      run: |
        sudo apt-get update -y
        sudo apt-get install -y imagemagick fonts-indic fonts-noto-core libraqm-dev
        sudo rm -f /etc/ImageMagick-6/policy.xml
        sudo rm -f /etc/ImageMagick-7/policy.xml

    - name: Install Python Libraries
      run: |
        pip install requests edge-tts moviepy==1.0.3 pillow==9.5.0 google-api-python-client google-auth-oauthlib google-auth-httplib2 urllib3==1.26.15

    - name: Run Video Generator Script
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        YOUTUBE_REFRESH_TOKEN_MYSTIC: ${{ secrets.YOUTUBE_REFRESH_TOKEN_MYSTIC }}
      run: python main.py
