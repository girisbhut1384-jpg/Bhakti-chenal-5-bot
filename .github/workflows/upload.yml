Name: Auto YouTube Shorts Generator

on:
  schedule:
    # ⏱️ हर 6 घंटे में (00:00, 06:00, 12:00, 18:00 UTC) अपने आप वीडियो बनाने के लिए
    - cron: '0 */6 * * *'
  workflow_dispatch: # बटन दबाकर जब चाहें मैन्युअल रूप से चलाने के लिए

jobs:
  build_and_upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies (ImageMagick, Fonts)
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick ffmpeg fonts-noto-core
        sudo rm -f /etc/ImageMagick-6/policy.xml
        sudo rm -f /etc/ImageMagick-7/policy.xml

    - name: Install Python Libraries
      run: |
        python -m pip install --upgrade pip
        # यहाँ moviepy==1.0.3 फिक्स लगा दिया गया है ताकि एडिटर क्रैश न हो
        pip install requests moviepy==1.0.3 pillow edge-tts google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

    - name: Run Video Generator Script
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        YT_CLIENT_SECRET_JSON: ${{ secrets.YT_CLIENT_SECRET_JSON }}
        YOUTUBE_TOKEN_GADGET: ${{ secrets.YOUTUBE_TOKEN_GADGET }}
        YOUTUBE_REFRESH_TOKEN_MYSTIC: ${{ secrets.YOUTUBE_REFRESH_TOKEN_MYSTIC }}
        YOUTUBE_TOKEN_EMPIRE: ${{ secrets.YOUTUBE_TOKEN_EMPIRE }}
        YOUTUBE_TOKEN_WEALTH: ${{ secrets.YOUTUBE_TOKEN_WEALTH }}
        YOUTUBE_TOKEN_ZEROTOUCH: ${{ secrets.YOUTUBE_TOKEN_ZEROTOUCH }}
      run: |
        python main.py
