name: Auto YouTube Shorts Generator

on:
  schedule:
    # भारतीय समयानुसार (IST) हर दोपहर 01:00 बजे अपने आप चलने के लिए (07:30 UTC)
    - cron: '30 7 * * *'
  workflow_dispatch: # बटन दबाकर तुरंत मैन्युअल रूप से चलाने के लिए

jobs:
  build_and_upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-python-version: '3.10'

    - name: Install System Dependencies (ImageMagick, Fonts)
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick ffmpeg fonts-noto-core
        # ImageMagick की सिक्योरिटी पॉलिसी को फिक्स करना ताकि वीडियो कनवर्टर क्रैश न हो
        sudo rm -f /etc/ImageMagick-6/policy.xml
        sudo rm -f /etc/ImageMagick-7/policy.xml

    - name: Install Python Libraries
      run: |
        python -m pip install --upgrade pip
        pip install requests moviepy pillow edge-tts google-auto-auth google-api-python-client

    - name: Run Video Generator Script
      run: |
        python main.py
